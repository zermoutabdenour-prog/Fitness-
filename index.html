<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Training System</title>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0a0a0f;
  color:white;
}

.page {
  display:none;
  padding:20px;
}

.page.active {
  display:block;
}

h1 {
  color:#4ea1ff;
}

.card {
  background:#1a1a25;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nb {
  flex:1;
  text-align:center;
  padding:15px;
  cursor:pointer;
  color:#aaa;
}

.nb.active {
  color:#4ea1ff;
}
</style>
</head>

<body>

<!-- PLAN -->
<div id="plan" class="page active">
  <h1>PLAN</h1>
  <div class="card">Weekly split ready ✅</div>
</div>

<!-- WORKOUT -->
<div id="workout" class="page">
  <h1>WORKOUT</h1>

  <div class="card">
    <b>Push Day</b><br>
    Bench Press – 4x8<br>
    Incline DB Press – 3x10<br>
    Shoulder Press – 3x10
  </div>

  <div class="card">
    <b>Pull Day</b><br>
    Pull Ups – 4x8<br>
    Rows – 3x10<br>
    Biceps – 3x12
  </div>
</div>

<!-- MORNING -->
<div id="morning" class="page">
  <h1>MORNING</h1>
  <div class="card">Wake up → Water → Walk 🚶</div>
</div>

<!-- TRACKER -->
<div id="tracker" class="page">
  <h1>TRACKER</h1>
  <div class="card">Weight tracking coming 🔥</div>
</div>

<!-- EXTRAS -->
<div id="extras" class="page">
  <h1>EXTRAS</h1>
  <div class="card">More features soon 🚀</div>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nb active" data-page="plan">PLAN</div>
  <div class="nb" data-page="workout">WORKOUT</div>
  <div class="nb" data-page="morning">MORNING</div>
  <div class="nb" data-page="tracker">TRACKER</div>
  <div class="nb" data-page="extras">EXTRAS</div>
</div>

<script>
document.querySelectorAll('.nb').forEach(btn => {
  btn.addEventListener('click', () => {

    const target = btn.getAttribute('data-page');
    const targetPage = document.getElementById(target);

    if (!targetPage) return;

    document.querySelectorAll('.page').forEach(p => {
      p.classList.remove('active');
    });

    targetPage.classList.add('active');

    document.querySelectorAll('.nb').forEach(b => {
      b.classList.remove('active');
    });

    btn.classList.add('active');

  });
});
</script>

</body>
</html>
