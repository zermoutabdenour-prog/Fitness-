<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0a0a0f;
      color:white;
    }
    .page{
      display:none;
      padding:20px;
    }
    .page.active{
      display:block;
    }
    .card{
      background:#1a1a25;
      padding:15px;
      border-radius:10px;
      margin-bottom:10px;
    }
    .nav{
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      background:#111;
      border-top:1px solid #222;
    }
    .nb{
      flex:1;
      text-align:center;
      padding:15px;
      cursor:pointer;
      color:#aaa;
    }
    .nb.active{
      color:#4ea1ff;
      font-weight:bold;
    }
    button{
      padding:12px;
      margin-top:10px;
      width:100%;
      background:#4ea1ff;
      border:none;
      color:white;
      border-radius:8px;
      cursor:pointer;
    }
    button.secondary{
      background:#222;
    }
    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #333;
      background:#111827;
      color:white;
      box-sizing:border-box;
    }
    h1,h2,h3{
      margin-top:0;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
    }
    .small{
      color:#aaa;
      font-size:14px;
    }
    .done{
      border:1px solid #22c55e;
      background:#102218;
    }
    .row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .hidden{
      display:none !important;
    }
    #history div{
      padding:10px 0;
      border-bottom:1px solid #222;
    }
    .status{
      background:#111827;
      border:1px solid #1f2937;
      padding:10px;
      border-radius:8px;
      margin-bottom:10px;
      color:#cbd5e1;
    }
    .spacer{
      height:90px;
    }
  </style>
</head>
<body>

  <!-- AUTH PAGE -->
  <div id="authPage" class="page active">
    <h2 id="authTitle">Login</h2>
    <div class="small">Real Supabase authentication</div>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />

    <button id="mainAuthBtn">Login</button>
    <button class="secondary" id="switchBtn">Need an account? Sign Up</button>

    <div id="authMessage" class="small" style="margin-top:12px;"></div>
  </div>

  <!-- APP PAGE -->
  <div id="appPage" class="page">
    <div class="topbar">
      <div>
        <h2>FitTrack Pro</h2>
        <div class="small" id="userEmail">Logged in</div>
      </div>
      <div style="min-width:140px;">
        <button class="secondary" style="margin-top:0;" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- WORKOUT -->
    <div id="workoutPage">
      <h3>Workout</h3>
      <div class="status">Tap any exercise to mark it done and save it to Supabase.</div>

      <div id="benchCard" class="card" onclick="toggleWorkout('Bench Press', 'benchCard')">
        <div class="row">
          <div>
            <strong>Bench Press</strong><br>
            <span class="small">4 x 8</span>
          </div>
          <div>✔️</div>
        </div>
      </div>

      <div id="inclineCard" class="card" onclick="toggleWorkout('Incline DB Press', 'inclineCard')">
        <div class="row">
          <div>
            <strong>Incline DB Press</strong><br>
            <span class="small">3 x 10</span>
          </div>
          <div>✔️</div>
        </div>
      </div>

      <div id="shoulderCard" class="card" onclick="toggleWorkout('Shoulder Press', 'shoulderCard')">
        <div class="row">
          <div>
            <strong>Shoulder Press</strong><br>
            <span class="small">3 x 10</span>
          </div>
          <div>✔️</div>
        </div>
      </div>

      <div id="workoutStatus" class="small" style="margin-top:12px;"></div>
    </div>

    <!-- TRACKER -->
    <div id="trackerPage" class="hidden">
      <h3>Tracker</h3>
      <div class="status">Save your weight and load history from Supabase.</div>

      <input id="weight" type="number" step="0.1" placeholder="Enter weight in kg" />
      <button onclick="saveWeight()">Save Weight</button>

      <h3 style="margin-top:20px;">History</h3>
      <div id="history" class="card"></div>
    </div>

    <div class="spacer"></div>
  </div>

  <!-- NAV -->
  <div id="navBar" class="nav hidden">
    <div id="navWorkout" class="nb active" onclick="showPage('workout')">Workout</div>
    <div id="navTracker" class="nb" onclick="showPage('tracker')">Tracker</div>
  </div>

  <script>
    const supabase = window.supabase.createClient(
      "https://hcgdvkztosxlpzoyabmc.supabase.co",
      "sb_publishable_E-OglMzuyvUeXsfCPUOBnQ_fGuO1dJP"
    );

    let authMode = "login";

    const mainBtn = document.getElementById("mainAuthBtn");
    const switchBtn = document.getElementById("switchBtn");

    function setAuthMessage(msg, isError = false) {
      const el = document.getElementById("authMessage");
      el.textContent = msg;
      el.style.color = isError ? "#ef4444" : "#9ca3af";
    }

    function switchMode() {
      const title = document.getElementById("authTitle");

      if (authMode === "login") {
        authMode = "signup";
        title.textContent = "Sign Up";
        mainBtn.textContent = "Create Account";
        switchBtn.textContent = "Already have an account? Login";
      } else {
        authMode = "login";
        title.textContent = "Login";
        mainBtn.textContent = "Login";
        switchBtn.textContent = "Need an account? Sign Up";
      }

      setAuthMessage("");
    }

    mainBtn.addEventListener("click", async () => {
      if (authMode === "login") {
        await login();
      } else {
        await signup();
      }
    });

    switchBtn.addEventListener("click", switchMode);

    async function signup() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setAuthMessage("Please enter email and password.", true);
        return;
      }

      const { error } = await supabase.auth.signUp({
        email,
        password
      });

      if (error) {
        setAuthMessage(error.message, true);
        return;
      }

      setAuthMessage("Account created. Check your email if confirmation is required.");
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setAuthMessage("Please enter email and password.", true);
        return;
      }

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        setAuthMessage(error.message, true);
        return;
      }

      openApp(data.user);
    }

    async function logout() {
      await supabase.auth.signOut();
      document.getElementById("appPage").classList.remove("active");
      document.getElementById("navBar").classList.add("hidden");
      document.getElementById("authPage").classList.add("active");
      setAuthMessage("Logged out.");
    }

    function openApp(user) {
      document.getElementById("authPage").classList.remove("active");
      document.getElementById("appPage").classList.add("active");
      document.getElementById("navBar").classList.remove("hidden");
      document.getElementById("userEmail").textContent = user.email;
      showPage("workout");
      loadWeights();
      setAuthMessage("");
    }

    function showPage(page) {
      document.getElementById("workoutPage").classList.add("hidden");
      document.getElementById("trackerPage").classList.add("hidden");
      document.getElementById("navWorkout").classList.remove("active");
      document.getElementById("navTracker").classList.remove("active");

      if (page === "workout") {
        document.getElementById("workoutPage").classList.remove("hidden");
        document.getElementById("navWorkout").classList.add("active");
      } else {
        document.getElementById("trackerPage").classList.remove("hidden");
        document.getElementById("navTracker").classList.add("active");
      }
    }

    async function toggleWorkout(exerciseName, cardId) {
      const { data: userData, error: userError } = await supabase.auth.getUser();

      if (userError || !userData.user) {
        alert("You must be logged in.");
        return;
      }

      const card = document.getElementById(cardId);

      const { error } = await supabase.from("workouts").insert({
        user_id: userData.user.id,
        exercise: exerciseName,
        completed: true
      });

      if (error) {
        alert(error.message);
        return;
      }

      card.classList.add("done");
      document.getElementById("workoutStatus").textContent = `${exerciseName} saved successfully.`;
    }

    async function saveWeight() {
      const weight = document.getElementById("weight").value.trim();
      const { data: userData, error: userError } = await supabase.auth.getUser();

      if (userError || !userData.user) {
        alert("You must be logged in.");
        return;
      }

      if (!weight) {
        alert("Enter your weight first.");
        return;
      }

      const { error } = await supabase.from("weights").insert({
        user_id: userData.user.id,
        weight: weight
      });

      if (error) {
        alert(error.message);
        return;
      }

      document.getElementById("weight").value = "";
      loadWeights();
    }

    async function loadWeights() {
      const { data: userData, error: userError } = await supabase.auth.getUser();

      if (userError || !userData.user) return;

      const { data, error } = await supabase
        .from("weights")
        .select("*")
        .eq("user_id", userData.user.id)
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("history").innerHTML = `<div>${error.message}</div>`;
        return;
      }

      if (!data || data.length === 0) {
        document.getElementById("history").innerHTML = "<div>No weight entries yet.</div>";
        return;
      }

      document.getElementById("history").innerHTML = data
        .map(item => `<div>${item.weight} kg</div>`)
        .join("");
    }

    async function checkSession() {
      const { data } = await supabase.auth.getSession();
      if (data && data.session && data.session.user) {
        openApp(data.session.user);
      }
    }

    checkSession();
  </script>
</body>
</html>
