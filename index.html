<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FitTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  padding: 20px;
}

input {
  width: 300px;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 320px;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.login-btn {
  background: #4da3ff;
}

.signup-btn {
  background: #333;
}

.msg {
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
  display: none;
}

.msg.show {
  display: block;
}

.msg.error {
  background: #5a1e1e;
}

.msg.ok {
  background: #1e5a2e;
}
</style>
</head>

<body>

<h1>FitTrack Pro</h1>

<input id="email" placeholder="Email">
<br>
<input id="password" type="password" placeholder="Password">
<br>

<button class="login-btn" onclick="login()">Login</button>
<button class="signup-btn" onclick="signup()">Create Account</button>

<div id="msg" class="msg"></div>

<script>
const supabaseUrl = "https://hcgdvkztosxlpzoyabmc.supabase.co";
const supabaseKey = "PASTE_YOUR_FULL_KEY_HERE";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

function showMsg(text, type="ok") {
  const box = document.getElementById("msg");
  box.innerText = text;
  box.className = "msg show " + type;
}

async function signup() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showMsg("Enter email & password", "error");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    showMsg(error.message, "error");
  } else {
    showMsg("Account created! Now login.", "ok");
  }
}

async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if (error) {
    showMsg(error.message, "error");
  } else {
    showMsg("Login successful 🚀", "ok");
  }
}
</script>

</body>
</html>
