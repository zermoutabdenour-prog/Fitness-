<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitTrack Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#0a0a0f;color:white;font-family:Arial}
.page{display:none;padding:20px}
.page.active{display:block}
.card{background:#1a1a25;padding:15px;border-radius:10px;margin-bottom:10px;cursor:pointer}
.nav{position:fixed;bottom:0;width:100%;display:flex;background:#111}
.nb{flex:1;text-align:center;padding:15px;color:#aaa;cursor:pointer}
.nb.active{color:#4ea1ff}
button{padding:10px;margin-top:10px;width:100%;background:#4ea1ff;border:none;color:white;border-radius:8px}
input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="page">

<div id="workout">
<h2>Workout</h2>

<div class="card" onclick="toggleDone('bench')">
Bench Press ✔️
</div>

<div class="card" onclick="toggleDone('incline')">
Incline Press ✔️
</div>

</div>

<div id="tracker" style="display:none">
<h2>Tracker</h2>
<input id="weight" placeholder="Enter weight">
<button onclick="saveWeight()">Save</button>
<div id="history"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div class="nb active" onclick="showPage('workout', this)">Workout</div>
<div class="nb" onclick="showPage('tracker', this)">Tracker</div>
</div>

<script>

// ✅ YOUR SUPABASE CONNECTION
const supabase = window.supabase.createClient(
"https://hcgdvkztosxlpzoyabmc.supabase.co",
"sb_publishable_E-OglMzuyvUeXsfCPUOBnQ_fGuO1dJP"
)

// ================= LOGIN =================
async function signup(){
await supabase.auth.signUp({
email:email.value,
password:password.value
})
alert("Check your email 📩")
}

async function login(){
const {data,error} = await supabase.auth.signInWithPassword({
email:email.value,
password:password.value
})

if(error){
alert(error.message)
}else{
document.getElementById("login").classList.remove("active")
document.getElementById("app").classList.add("active")
loadWeights()
}
}

// ================= NAV =================
function showPage(page, el){
document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'))
el.classList.add('active')

document.getElementById("workout").style.display="none"
document.getElementById("tracker").style.display="none"

document.getElementById(page).style.display="block"
}

// ================= WORKOUT SAVE =================
async function toggleDone(name){
const { data } = await supabase.auth.getUser()

await supabase.from("workouts").insert({
user_id:data.user.id,
exercise:name,
done:true
})

alert("Saved ✔️")
}

// ================= WEIGHT SAVE =================
async function saveWeight(){
const { data } = await supabase.auth.getUser()

await supabase.from("weights").insert({
user_id:data.user.id,
weight:weight.value
})

loadWeights()
}

// ================= LOAD DATA =================
async function loadWeights(){
const { data: userData } = await supabase.auth.getUser()

const { data } = await supabase
.from("weights")
.select("*")
.eq("user_id",userData.user.id)
.order("id",{ascending:false})

history.innerHTML = data.map(d=>`<div>${d.weight} kg</div>`).join("")
}

</script>

</body>
</html>
