<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FitTrack Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#0b1220;color:white;font-family:Arial;padding:20px;">

<h2>FitTrack Pro (FINAL FIX)</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="test()">TEST</button>
<button onclick="signup()">SIGN UP</button>
<button onclick="login()">LOGIN</button>

<p id="msg">Loading...</p>

<script>
const url = "https://hcgdvkztosxlpzoyabmc.supabase.co";
const key = "sb_publishable_E-OglMzuyvUeXsfCPUOBnQ_fGuO1dJP";

const msg = document.getElementById("msg");

function show(t){ msg.innerText = t; }

window.onload = () => {
  if(!window.supabase){
    show("❌ Supabase not loaded");
    return;
  }
  window.sb = window.supabase.createClient(url, key);
  show("✅ Ready");
};

async function test(){
  try{
    const r = await fetch(url+"/auth/v1/settings",{headers:{apikey:key}});
    show("Status: "+r.status);
  }catch(e){
    show("Error: "+e.message);
  }
}

async function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const {error} = await sb.auth.signUp({email,password});
  show(error ? error.message : "Signup OK");
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const {error} = await sb.auth.signInWithPassword({email,password});
  show(error ? error.message : "LOGIN SUCCESS");
}
</script>

</body>
</html>
