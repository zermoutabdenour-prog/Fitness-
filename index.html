<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack Pro">
<title>FitTrack Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #f0f0f8;
  font-family: -apple-system, Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 400px;
  padding: 40px 24px;
}
.logo {
  font-size: 32px;
  font-weight: 800;
  color: #3b82f6;
  letter-spacing: 1px;
  margin-bottom: 6px;
  text-align: center;
}
.tagline {
  font-size: 13px;
  color: #6b6b8a;
  text-align: center;
  margin-bottom: 40px;
}
.card {
  background: #1e1e2d;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 28px 24px;
}
.card h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  color: #f0f0f8;
}
.card p {
  font-size: 13px;
  color: #6b6b8a;
  margin-bottom: 24px;
}
.input-group {
  margin-bottom: 14px;
}
.input-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #9090b0;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}
.input-group input {
  width: 100%;
  background: #13131c;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 13px 16px;
  color: #f0f0f8;
  font-size: 15px;
  outline: none;
  -webkit-appearance: none;
}
.input-group input:focus {
  border-color: #3b82f6;
}
.btn-primary {
  width: 100%;
  background: #3b82f6;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 15px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  letter-spacing: 0.3px;
}
.btn-primary:active { opacity: 0.85; }
.btn-secondary {
  width: 100%;
  background: transparent;
  color: #3b82f6;
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
}
.msg {
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  text-align: center;
  display: none;
}
.msg.error { background: rgba(239,68,68,0.15); color: #ef4444; display: block; }
.msg.success { background: rgba(34,197,94,0.15); color: #22c55e; display: block; }
.msg.info { background: rgba(59,130,246,0.15); color: #3b82f6; display: block; }
.toggle {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #6b6b8a;
}
.toggle span {
  color: #3b82f6;
  cursor: pointer;
  font-weight: 600;
}
.loading {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="container">
  <div class="logo">FITTRACK PRO</div>
  <div class="tagline">Your 20-week transformation · 112kg → 93kg</div>

  <!-- LOGIN FORM -->
  <div class="card" id="login-card">
    <h2>Welcome back</h2>
    <p>Sign in to access your training plan</p>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="login()">Sign In</button>
    <div class="msg" id="login-msg"></div>
    <div class="toggle">Don't have an account? <span onclick="showSignup()">Sign Up</span></div>
  </div>

  <!-- SIGNUP FORM -->
  <div class="card" id="signup-card" style="display:none">
    <h2>Create account</h2>
    <p>Start your transformation today</p>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password">
    </div>
    <button class="btn-primary" onclick="signup()">Create Account</button>
    <div class="msg" id="signup-msg"></div>
    <div class="toggle">Already have an account? <span onclick="showLogin()">Sign In</span></div>
  </div>
</div>

<script>
// ─── PASTE YOUR SUPABASE CREDENTIALS HERE ───────────────────────
const SUPABASE_URL = "https://hcgdvkztosxlpzyoabmc.supabase.co";
const SUPABASE_ANON_KEY = "PASTE_YOUR_REAL_ANON_KEY_HERE"; // eyJ... long key from Supabase dashboard
// ────────────────────────────────────────────────────────────────

let sb;

window.onload = () => {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    checkSession();
  } catch(e) {
    showMsg('login-msg', 'error', 'Setup error: ' + e.message);
  }
};

async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    goToApp();
  }
}

function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}

function showSignup() {
  document.getElementById('login-card').style.display = 'none';
  document.getElementById('signup-card').style.display = 'block';
}

function showLogin() {
  document.getElementById('signup-card').style.display = 'none';
  document.getElementById('login-card').style.display = 'block';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) {
    showMsg('login-msg', 'error', 'Please enter email and password');
    return;
  }
  showMsg('login-msg', 'info', 'Signing in...');
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    showMsg('login-msg', 'error', error.message);
  } else {
    showMsg('login-msg', 'success', 'Login successful! Loading app...');
    setTimeout(goToApp, 800);
  }
}

async function signup() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!email || !password) {
    showMsg('signup-msg', 'error', 'Please enter email and password');
    return;
  }
  if (password.length < 6) {
    showMsg('signup-msg', 'error', 'Password must be at least 6 characters');
    return;
  }
  showMsg('signup-msg', 'info', 'Creating account...');
  const { error } = await sb.auth.signUp({ email, password });
  if (error) {
    showMsg('signup-msg', 'error', error.message);
  } else {
    showMsg('signup-msg', 'success', 'Account created! Check your email to confirm, then sign in.');
  }
}

function goToApp() {
  // Redirect to your main app page
  window.location.href = 'app.html';
}
</script>
</body>
</html>
