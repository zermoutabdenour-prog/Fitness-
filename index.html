<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>FitTrack Pro</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #111827;
      border: 1px solid #333;
      color: white;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .login-btn {
      background: #3b82f6;
      color: white;
    }

    .signup-btn {
      background: #222;
      color: white;
    }

    #appPage {
      display: none;
    }
  </style>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage">
  <h2>Login</h2>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button class="login-btn" onclick="loginUser()">Login</button>
  <button class="signup-btn" onclick="signupUser()">Create Account</button>
</div>


<!-- ================= APP PAGE ================= -->
<div id="appPage">
  <h2>Welcome 🚀</h2>
  <p>You are logged in</p>

  <button onclick="logoutUser()">Logout</button>
</div>


<!-- ================= SUPABASE ================= -->
<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

// 🔥 YOUR CONFIG (already correct)
const supabaseUrl = "https://hcgdvkztosxlpzyoabmc.supabase.co"
const supabaseKey = "sb_publishable_E-OglMzuyvUeXsfCPUOBnQ_fGuO1dJP"

const supabase = createClient(supabaseUrl, supabaseKey)


// ================= LOGIN =================
window.loginUser = async function () {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  if (!email || !password) {
    alert("Enter email & password")
    return
  }

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  })

  if (error) {
    alert("❌ " + error.message)
    return
  }

  alert("✅ Login successful")

  document.getElementById("loginPage").style.display = "none"
  document.getElementById("appPage").style.display = "block"
}


// ================= SIGNUP =================
window.signupUser = async function () {
  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  if (!email || !password) {
    alert("Enter email & password first")
    return
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  })

  if (error) {
    alert("❌ " + error.message)
    return
  }

  alert("✅ Account created — now login")
}


// ================= LOGOUT =================
window.logoutUser = async function () {
  await supabase.auth.signOut()

  document.getElementById("appPage").style.display = "none"
  document.getElementById("loginPage").style.display = "block"
}


// ================= AUTO SESSION =================
const { data: { session } } = await supabase.auth.getSession()

if (session) {
  document.getElementById("loginPage").style.display = "none"
  document.getElementById("appPage").style.display = "block"
}
</script>

</body>
</html>
