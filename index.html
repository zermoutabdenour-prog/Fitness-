<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FitTrack Debug FIXED</title>

  <!-- IMPORTANT: Supabase script -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background:#0b1220;
      color:#fff;
      font-family:Arial;
      padding:20px;
    }
    input, button {
      width:300px;
      padding:10px;
      margin:5px 0;
      border-radius:6px;
      border:none;
    }
    button {
      background:#4da3ff;
      color:white;
      cursor:pointer;
    }
    #status {
      margin-top:20px;
      padding:10px;
      border:1px solid #555;
    }
  </style>
</head>

<body>

<h2>FitTrack Debug</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="testConnection()">TEST CONNECTION</button>
<button onclick="signup()">SIGN UP</button>
<button onclick="login()">LOGIN</button>

<div id="status">Waiting...</div>

<script>
  // 🔴 YOUR DATA
  const supabaseUrl = "https://hcgdvkztosxlpzoyabmc.supabase.co";
  const supabaseKey = "sb_publishable_E-OglMzuyvUeXsfCPUOBnQ_fGuO1dJP";

  let supabase;

  function show(msg){
    document.getElementById("status").innerText = msg;
  }

  // 🔴 INIT
  window.onload = function(){
    if (!window.supabase) {
      show("❌ Supabase script NOT loaded");
      return;
    }

    supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
    show("✅ JS Loaded — Ready");
  }

  // 🔴 TEST CONNECTION
  async function testConnection(){
    show("Testing...");

    try {
      const res = await fetch(supabaseUrl + "/auth/v1/settings", {
        headers: { apikey: supabaseKey }
      });

      show("Status: " + res.status);
    } catch (e) {
      show("❌ ERROR: " + e.message);
    }
  }

  // 🔴 SIGNUP
  async function signup(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({ email, password });

    if(error){
      show("❌ Signup error: " + error.message);
    } else {
      show("✅ Signup OK (check email if enabled)");
    }
  }

  // 🔴 LOGIN
  async function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if(error){
      show("❌ Login error: " + error.message);
    } else {
      show("✅ LOGIN SUCCESS");
    }
  }
</script>

</body>
</html>
