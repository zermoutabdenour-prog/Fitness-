<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FitTrack Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#0b1220;color:white;font-family:Arial;padding:30px;">

<h2>FitTrack Pro</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="test()">TEST CONNECTION</button>
<button onclick="signup()">SIGN UP</button>
<button onclick="login()">LOGIN</button>

<p id="msg">Loading...</p>

<script>
const supabaseUrl = "https://hcgdvkztosxlpzyoabmc.supabase.co";
const supabaseKey = "sb_publishable_E-OglMzuyvUeXsfCPUOBnQ_fGuO1dJP";

let supabase;
const msg = document.getElementById("msg");

window.onload = () => {
  if (!window.supabase) {
    msg.innerText = "Supabase library not loaded";
    return;
  }
  supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
  msg.innerText = "Ready";
};

async function test() {
  try {
    const res = await fetch(supabaseUrl + "/auth/v1/settings", {
      headers: { apikey: supabaseKey }
    });
    msg.innerText = "Connection OK: " + res.status;
  } catch (e) {
    msg.innerText = "Failed: " + e.message;
  }
}

async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.signUp({ email, password });
  msg.innerText = error ? error.message : "Signup OK";
}

async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  msg.innerText = error ? error.message : "Login OK";
}
</script>

</body>
</html>
