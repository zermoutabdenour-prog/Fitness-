<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack Pro Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#0b1220;
      color:#fff;
      padding:20px;
      margin:0;
    }
    h1{margin-top:0}
    input{
      width:100%;
      max-width:420px;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #334155;
      background:#111827;
      color:#fff;
      box-sizing:border-box;
    }
    button{
      width:100%;
      max-width:420px;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:700;
    }
    .primary{background:#4da3ff;color:#fff;}
    .secondary{background:#2a2f3a;color:#fff;}
    .box{
      max-width:900px;
      background:#111827;
      border:1px solid #334155;
      border-radius:10px;
      padding:14px;
      margin-top:16px;
      white-space:pre-wrap;
      word-break:break-word;
      line-height:1.5;
    }
    .ok{border-color:#166534;color:#bbf7d0;background:#052e16;}
    .err{border-color:#991b1b;color:#fecaca;background:#450a0a;}
    .muted{color:#94a3b8}
  </style>
</head>
<body>
  <h1>FitTrack Pro Debug</h1>
  <div class="muted">This page will show the exact connection/auth problem.</div>

  <input id="email" type="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button class="secondary" onclick="testConnection()">1. Test Supabase Connection</button>
  <button class="secondary" onclick="signup()">2. Create Account</button>
  <button class="primary" onclick="login()">3. Login</button>

  <div id="status" class="box">Waiting...</div>

  <script>
    const supabaseUrl = "https://hcgdvkztosxlpzoyabmc.supabase.co";
    const supabaseKey = "PASTE_YOUR_FULL_COPIED_PUBLISHABLE_KEY_HERE";

    function show(msg, type="") {
      const el = document.getElementById("status");
      el.className = "box " + type;
      el.textContent = msg;
    }

    function getCreds() {
      return {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value.trim()
      };
    }

    let supabase = null;

    try {
      if (!window.supabase) {
        show("Supabase browser library did not load from jsdelivr.", "err");
      } else {
        supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
        show("Library loaded. Ready to test.", "ok");
      }
    } catch (e) {
      show("Init error:\n" + (e?.message || e), "err");
    }

    async function testConnection() {
      try {
        if (!supabase) {
          show("Supabase client is not initialized.", "err");
          return;
        }

        show("Testing network to Supabase...", "");
        const res = await fetch(supabaseUrl + "/auth/v1/settings", {
          method: "GET",
          headers: {
            "apikey": supabaseKey
          }
        });

        const text = await res.text();

        show(
          "Connection test finished.\n\n" +
          "HTTP status: " + res.status + "\n\n" +
          "Response preview:\n" + text.slice(0, 800),
          res.ok ? "ok" : "err"
        );
      } catch (e) {
        show(
          "Network test failed.\n\n" +
          "Error: " + (e?.message || e) + "\n\n" +
          "This usually means one of these:\n" +
          "1) wrong/incomplete publishable key\n" +
          "2) browser extension or VPN blocking request\n" +
          "3) network/privacy setting blocking Supabase\n" +
          "4) wrong Supabase URL\n",
          "err"
        );
      }
    }

    async function signup() {
      try {
        if (!supabase) {
          show("Supabase client is not initialized.", "err");
          return;
        }

        const { email, password } = getCreds();
        if (!email || !password) {
          show("Enter email and password first.", "err");
          return;
        }

        show("Creating account...", "");

        const { data, error } = await supabase.auth.signUp({
          email,
          password
        });

        if (error) {
          show("Signup error:\n" + error.message, "err");
          return;
        }

        show(
          "Signup success.\n\nReturned data:\n" +
          JSON.stringify(data, null, 2),
          "ok"
        );
      } catch (e) {
        show("Signup crashed:\n" + (e?.message || e), "err");
      }
    }

    async function login() {
      try {
        if (!supabase) {
          show("Supabase client is not initialized.", "err");
          return;
        }

        const { email, password } = getCreds();
        if (!email || !password) {
          show("Enter email and password first.", "err");
          return;
        }

        show("Logging in...", "");

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          show("Login error:\n" + error.message, "err");
          return;
        }

        show(
          "Login success.\n\nReturned data:\n" +
          JSON.stringify(data, null, 2),
          "ok"
        );
      } catch (e) {
        show("Login crashed:\n" + (e?.message || e), "err");
      }
    }
  </script>
</body>
</html>
